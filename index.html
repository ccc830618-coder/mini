<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>福岡蜜月 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { lavender: { 50: '#FDFBFD', 100: '#F4EBFC', 200: '#E6D4F4', 300: '#D4B3EA', 400: '#BD8ADD', 500: '#A160CE', 600: '#8A45B8' } } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { background-color: #FDFBFD; font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        [v-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes slide-up { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slide-up 0.3s ease-out; }
    </style>
</head>
<body class="text-gray-700">

<div id="app" v-cloak class="max-w-md mx-auto bg-lavender-50 min-h-screen relative shadow-xl overflow-hidden">
    
    <!-- 頁首 Banner -->
    <header class="relative h-[180px] w-full bg-lavender-200">
        <img src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=800&q=80" alt="Fukuoka" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
        <div class="absolute bottom-12 left-0 right-0 text-center text-white font-black tracking-widest italic text-2xl drop-shadow-lg">FUKUOKA</div>
        
        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex space-x-1 bg-white/20 backdrop-blur-md p-1 rounded-2xl border border-white/30 z-20">
            <button v-for="tab in tabs" :key="tab.id" @click="activeTab = tab.id" 
                    :class="activeTab === tab.id ? 'bg-white text-lavender-600 shadow-sm' : 'text-white'" 
                    class="px-5 py-1.5 rounded-xl text-xs font-black transition-all">
                {{ tab.name }}
            </button>
        </div>
    </header>

    <main class="bg-lavender-50 rounded-t-[32px] -mt-6 relative z-10 min-h-[calc(100vh-156px)] pb-24 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] px-5 pt-6">
        
        <!-- 同步狀態 -->
        <div class="flex items-center justify-center space-x-2 mb-6">
            <div :class="dbConnected ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]' : 'bg-red-400'" class="w-2 h-2 rounded-full"></div>
            <span class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400">
                {{ dbConnected ? 'Cloud Sync Online' : 'Connecting to Cloud...' }}
            </span>
        </div>

        <!-- 行程 -->
        <div v-show="activeTab === 'itinerary'" class="animate-slide-up space-y-6">
            <!-- 機票卡片 -->
            <div class="grid grid-cols-2 gap-3">
                <div v-for="(f, key) in flights" :key="key" @click="openFlightEdit(key)" class="bg-white p-5 rounded-[2rem] shadow-sm border border-lavender-100 active:scale-95 transition-all cursor-pointer">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[9px] font-black text-white px-2 py-0.5 rounded" :class="key === 'dep' ? 'bg-lavender-500' : 'bg-gray-800'">{{ key === 'dep' ? '5/5 GO' : '5/10 BACK' }}</span>
                        <i class="ph-bold ph-airplane-tilt text-lavender-100 text-xl"></i>
                    </div>
                    <div class="text-center">
                        <p class="text-xl font-black text-gray-800">{{ f.code }}</p>
                        <p class="text-[10px] font-bold text-gray-400 mt-1 uppercase">{{ f.fromCode }} <i class="ph ph-arrow-right inline text-[8px]"></i> {{ f.toCode }}</p>
                        <div class="mt-3 flex justify-between items-center border-t border-lavender-50 pt-3 text-[11px] font-black text-lavender-600">
                            <span>{{ f.depTime }}</span>
                            <span class="text-gray-300">T{{ f.terminal }}</span>
                            <span>{{ f.arrTime }}</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="text-center py-12 text-gray-300 font-black border-2 border-dashed border-lavender-100 rounded-[2.5rem] text-[10px] tracking-widest uppercase">Itinerary Module Ready</div>
        </div>

        <!-- 購物 -->
        <div v-show="activeTab === 'shopping'" class="animate-slide-up space-y-5">
            <div v-for="(cat, cIdx) in shopping" :key="cIdx" class="bg-white rounded-[2.5rem] shadow-sm border border-lavender-100 overflow-hidden">
                <div class="p-4 bg-lavender-50/50 flex justify-between items-center px-6">
                    <input v-model="cat.name" @change="saveData" class="font-black text-gray-700 bg-transparent outline-none w-full focus:text-lavender-600">
                    <button @click="confirmDeleteCat(cIdx)" class="text-gray-300 hover:text-red-400 p-2"><i class="ph-bold ph-trash text-lg"></i></button>
                </div>
                <div class="p-6 space-y-5">
                    <div v-for="(item, iIdx) in cat.items" :key="iIdx" class="pb-2">
                        <div class="flex items-center justify-between mb-2">
                            <div class="flex items-center space-x-3">
                                <input type="checkbox" v-model="item.done" @change="saveData" class="w-6 h-6 accent-lavender-500 rounded-xl">
                                <input v-model="item.name" @change="saveData" class="font-bold text-gray-800 outline-none" :class="item.done ? 'line-through text-gray-300' : ''">
                            </div>
                            <button @click="cat.items.splice(iIdx, 1); saveData()" class="text-gray-200"><i class="ph-bold ph-x-circle text-xl"></i></button>
                        </div>
                        <div class="flex flex-wrap gap-2 pl-9">
                            <span v-for="(tag, tIdx) in item.tags" :key="tIdx" @click="removeTag(item, tIdx)" class="text-[9px] font-black bg-lavender-50 text-lavender-500 px-3 py-1 rounded-full border border-lavender-100 cursor-pointer">
                                {{ tag }}
                            </span>
                            <button @click="addNewTag(item)" class="text-[9px] font-black text-gray-300 border border-dashed border-gray-200 px-3 py-1 rounded-full">＋標籤</button>
                        </div>
                    </div>
                    <button @click="cat.items.push({name: '新商品', done: false, tags: ['必買']}); saveData()" class="w-full py-3 bg-gray-50 rounded-2xl text-[10px] text-gray-400 font-black uppercase tracking-widest">新增項目</button>
                </div>
            </div>
            <button @click="shopping.push({name: '新清單', items: []}); saveData()" class="w-full py-6 border-2 border-dashed border-lavender-200 rounded-[2.5rem] text-lavender-300 font-black text-xs">＋新增購物類別</button>
        </div>

    </main>

    <!-- 編輯視窗 -->
    <div v-if="modal.show" class="fixed inset-0 bg-black/60 backdrop-blur-md z-[100] flex items-end">
        <div class="bg-white w-full max-w-md mx-auto rounded-t-[40px] p-8 animate-slide-up pb-12">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-black text-gray-800">{{ modal.title }}</h2>
                <button @click="modal.show = false" class="bg-gray-50 p-2 rounded-full text-gray-300"><i class="ph ph-x text-xl"></i></button>
            </div>
            <div v-if="modal.type === 'flight'" class="space-y-5">
                <input v-model="form.code" class="w-full bg-gray-50 p-4 rounded-2xl font-black outline-none border-2 border-transparent focus:border-lavender-200" placeholder="航班編號">
                <div class="grid grid-cols-2 gap-3">
                    <input v-model="form.depTime" class="bg-gray-50 p-4 rounded-2xl font-black text-center" placeholder="起飛">
                    <input v-model="form.arrTime" class="bg-gray-50 p-4 rounded-2xl font-black text-center" placeholder="抵達">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input v-model="form.fromCode" placeholder="TPE" class="bg-gray-50 p-4 rounded-2xl font-black text-center uppercase">
                    <input v-model="form.toCode" placeholder="FUK" class="bg-gray-50 p-4 rounded-2xl font-black text-center uppercase">
                </div>
                <input v-model="form.terminal" class="w-full bg-gray-50 p-4 rounded-2xl font-black outline-none" placeholder="航廈">
                <button @click="saveFlight" class="w-full bg-lavender-500 text-white font-black p-5 rounded-3xl shadow-lg active:scale-95 transition-all mt-4">儲存至雲端</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

    // 💡 已經根據您的截圖填入正確金鑰！
    const firebaseConfig = {
        apiKey: "AIzaSyC_PS1_6Ckqv6acED6Rs_A3r", 
        authDomain: "mini-app-50ba0.firebaseapp.com",
        projectId: "mini-app-50ba0",
        storageBucket: "mini-app-50ba0.firebasestorage.app",
        messagingSenderId: "542487239410",
        appId: "1:542487239410:web:7abf8ad3f5a"
    };

    const { createApp, ref, onMounted } = Vue;

    createApp({
        setup() {
            const activeTab = ref('itinerary');
            const dbConnected = ref(false);
            const tabs = [{ id: 'itinerary', name: '行程' }, { id: 'shopping', name: '購物' }];
            const flights = ref({
                dep: { code: 'BR106', depTime: '08:10', arrTime: '11:35', fromCode: 'TPE', toCode: 'FUK', terminal: '2' },
                ret: { code: 'BR105', depTime: '12:20', arrTime: '13:50', fromCode: 'FUK', toCode: 'TPE', terminal: '1' }
            });
            const shopping = ref([{ name: '藥妝清單', items: [{name: '合利他命', done: false, tags: ['必買']}] }]);
            const modal = ref({ show: false, type: '', title: '', target: null });
            const form = ref({});

            const saveData = async () => {
                const data = { 
                    flights: JSON.parse(JSON.stringify(flights.value)), 
                    shopping: JSON.parse(JSON.stringify(shopping.value))
                };
                localStorage.setItem('fukuoka_v3_cloud', JSON.stringify(data));
                if (window.dbRef) await setDoc(window.dbRef, data).catch(e => console.error("Sync Error", e));
            };

            const openFlightEdit = (key) => {
                modal.value = { show: true, type: 'flight', title: '航班詳細編輯', target: key };
                form.value = { ...flights.value[key] };
            };

            const saveFlight = () => {
                flights.value[modal.value.target] = { ...form.value };
                modal.value.show = false; saveData();
            };

            const addNewTag = (item) => {
                const tag = prompt('新增標籤名稱：');
                if(tag) { item.tags.push(tag); saveData(); }
            };

            const removeTag = (item, idx) => {
                item.tags.splice(idx, 1); saveData();
            };

            const confirmDeleteCat = (idx) => {
                if(confirm('確定要刪除整個類別嗎？')) { shopping.value.splice(idx, 1); saveData(); }
            };

            onMounted(() => {
                try {
                    const app = initializeApp(firebaseConfig);
                    const db = getFirestore(app);
                    window.dbRef = doc(db, 'honeymoon', 'fukuoka2026');
                    
                    onSnapshot(window.dbRef, (snap) => {
                        dbConnected.value = true;
                        if (snap.exists()) {
                            const d = snap.data();
                            if(d.flights) flights.value = d.flights;
                            if(d.shopping) shopping.value = d.shopping;
                        }
                    });
                } catch (e) { console.error("Cloud Error", e); }
            });

            return { activeTab, dbConnected, tabs, flights, shopping, modal, form, openFlightEdit, saveFlight, addNewTag, removeTag, confirmDeleteCat, saveData };
        }
    }).mount('#app');
</script>
</body>
</html>
