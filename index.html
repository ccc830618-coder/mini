<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福岡蜜月旅行 (升級版)</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
body { background-color: #FDFBFD; font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }
.no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
[ v-cloak ] { display: none; }
</style>
</head>
<body class="text-gray-700 antialiased">
<div id="app" v-cloak class="max-w-md mx-auto bg-lavender-50 min-h-screen relative shadow-xl overflow-hidden">
  <!-- Header 與導覽保持原樣 -->
  <header class="relative h-[220px] w-full bg-lavender-200">
    <img src="M6cH6f4bdmcJryLEtnmhGktaYkUSfReqd8p9GlWL__1682_1121.jpg"
         alt="Fukuoka"
         class="w-full h-full object-cover object-left"
         onerror="this.src='https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=800&q=80'">
    <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
    <div class="relative text-center z-10 pt-10">
      <h1 class="text-white text-3xl font-black tracking-widest drop-shadow-md">FUKUOKA</h1>
      <p class="text-lavender-100 text-xs font-bold mt-1 tracking-[0.3em]">HONEYMOON 2026</p>
    </div>
    <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex space-x-1 bg-white/20 backdrop-blur-md p-1 rounded-2xl border border-white/30 z-20">
      <button @click="activeTab='itinerary'" :class="activeTab==='itinerary'?'bg-white text-lavender-600 shadow-sm':'text-white'" class="px-4 py-1.5 rounded-xl text-xs font-black transition-all">行程</button>
      <button @click="activeTab='info'" :class="activeTab==='info'?'bg-white text-lavender-600 shadow-sm':'text-white'" class="px-4 py-1.5 rounded-xl text-xs font-black transition-all">清單</button>
      <button @click="activeTab='shopping'" :class="activeTab==='shopping'?'bg-white text-lavender-600 shadow-sm':'text-white'" class="px-4 py-1.5 rounded-xl text-xs font-black transition-all">購物</button>
      <button @click="activeTab='expense'" :class="activeTab==='expense'?'bg-white text-lavender-600 shadow-sm':'text-white'" class="px-4 py-1.5 rounded-xl text-xs font-black transition-all">花費</button>
    </div>
  </header>

  <main class="bg-lavender-50 rounded-t-[32px] -mt-6 relative z-10 min-h-[calc(100vh-156px)] pb-24 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
    <!-- 雲端狀態 -->
    <div class="flex flex-col items-center py-3 space-y-1">
      <div class="flex items-center space-x-2 cursor-pointer" @click="changeUserName">
        <div :class="dbConnected?'bg-green-500 shadow-[0_0_6px_rgba(34,197,94,0.6)] animate-pulse':'bg-red-400'" class="w-1.5 h-1.5 rounded-full"></div>
        <span class="text-[9px] font-black uppercase tracking-widest" :class="dbConnected?'text-gray-400':'text-red-400'">{{ dbConnected?'Cloud Synced':'Offline' }}</span>
        <span class="text-[9px] font-bold text-lavender-500 bg-lavender-100 px-1.5 py-0.5 rounded-md flex items-center"><i class="ph-fill ph-user mr-1"></i>{{ userName||'未設定' }}</span>
      </div>
      <span v-if="lastUpdatedBy" class="text-[8px] font-bold text-gray-300 tracking-wider">最後更新由：{{ lastUpdatedBy }}</span>
    </div>

    <!-- 行程範例 -->
    <div v-show="activeTab==='itinerary'" class="px-5 space-y-4">
      <div v-for="(item, idx) in itinerary[activeDate]" :key="item.id" class="bg-white rounded-3xl shadow-sm border border-lavender-100 overflow-hidden p-4">
        <h3 class="text-lg font-bold text-gray-800">{{ item.name }}</h3>
        <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest">{{ item.category }} | {{ item.time }}</p>
      </div>
    </div>
  </main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyC_PS1_6Ckqv6acED6Rs_A3r",
  authDomain: "mini-app-50ba0.firebaseapp.com",
  projectId: "mini-app-50ba0",
  storageBucket: "mini-app-50ba0.firebasestorage.app",
  messagingSenderId: "542487239410",
  appId: "1:542487239410:web:7abf8ad3f5a"
};
const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);
const dbRef = doc(db,'honeymoon_projects','fukuoka_2026_final_sync');

const { createApp, ref, onMounted } = Vue;
createApp({
  setup(){
    const activeTab = ref('itinerary');
    const activeDate = ref('2026-05-05');
    const dbConnected = ref(false);
    const userName = ref(localStorage.getItem('fukuoka_username')||'');
    const lastUpdatedBy = ref('');
    const itinerary = ref({'2026-05-05':[],'2026-05-06':[],'2026-05-07':[],'2026-05-08':[],'2026-05-09':[],'2026-05-10':[]});
    
    // Firestore 連線
    onMounted(()=>{
      onSnapshot(dbRef,(docSnap)=>{
        if(docSnap.exists()){
          const data=docSnap.data();
          dbConnected.value=true;
          itinerary.value=data.itinerary || itinerary.value;
          lastUpdatedBy.value=data.lastUpdatedBy || '';
        } else { dbConnected.value=false; }
      }, (err)=>{ console.error(err); dbConnected.value=false; });
    });

    const changeUserName = ()=>{
      const name=prompt('請輸入你的名字',userName.value);
      if(name&&name.trim()!==''){userName.value=name.trim(); localStorage.setItem('fukuoka_username',userName.value);}
    };

    const saveData = async ()=>{
      if(!userName.value) changeUserName();
      const data={itinerary:JSON.parse(JSON.stringify(itinerary.value)),lastUpdatedBy:userName.value||'神秘旅伴'};
      try{await setDoc(dbRef,data);}catch(e){console.error(e);}
    };

    return {activeTab, activeDate, dbConnected, userName, lastUpdatedBy, itinerary, changeUserName, saveData};
  }
}).mount('#app');
</script>
</body>
</html>
