<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>福岡蜜月旅行 - 穩定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Vue.Draggable/4.1.0/vuedraggable.umd.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lavender: {
                            50: '#FDFBFD', 100: '#F4EBFC', 200: '#E6D4F4',
                            300: '#D4B3EA', 400: '#BD8ADD', 500: '#A160CE', 600: '#8A45B8'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { background-color: #FDFBFD; font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes slide-up { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slide-up 0.3s ease-out; }
        [v-cloak] { display: none; }
        .draggable-ghost { opacity: 0.5; background: #E6D4F4 !important; border: 2px dashed #A160CE !important; }
    </style>
</head>
<body class="text-gray-700 antialiased">

<div id="app" v-cloak class="max-w-md mx-auto bg-lavender-50 min-h-screen relative shadow-xl overflow-hidden">
    
    <!-- 頁首 Banner -->
    <header class="relative h-[220px] w-full bg-lavender-200">
        <img src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=800&q=80" alt="Fukuoka" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
        <div class="relative text-center z-10 pt-10">
            <h1 class="text-white text-3xl font-black tracking-widest drop-shadow-md">FUKUOKA</h1>
            <p class="text-lavender-100 text-xs font-bold mt-1 tracking-[0.3em]">HONEYMOON 2026</p>
        </div>
        
        <!-- 導覽切換 -->
        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex space-x-1 bg-white/20 backdrop-blur-md p-1 rounded-2xl border border-white/30 z-20">
            <button v-for="tab in ['itinerary', 'info', 'shopping', 'expense']" :key="tab" @click="activeTab = tab" 
                    :class="activeTab === tab ? 'bg-white text-lavender-600 shadow-sm' : 'text-white'" 
                    class="px-4 py-1.5 rounded-xl text-xs font-black transition-all capitalize">
                {{ tab === 'itinerary' ? '行程' : (tab === 'info' ? '清單' : (tab === 'shopping' ? '購物' : '花費')) }}
            </button>
        </div>
    </header>

    <main class="bg-lavender-50 rounded-t-[32px] -mt-6 relative z-10 min-h-[calc(100vh-156px)] pb-24 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
        
        <!-- 狀態顯示 -->
        <div class="flex flex-col items-center justify-center py-3 space-y-1">
            <div class="flex items-center space-x-2 cursor-pointer active:scale-95 transition-all" @click="changeUserName">
                <div :class="dbConnected ? 'bg-green-500 animate-pulse' : 'bg-red-400'" class="w-1.5 h-1.5 rounded-full"></div>
                <span class="text-[9px] font-black uppercase tracking-widest text-gray-400">
                    {{ dbConnected ? 'Cloud Synced' : 'Offline' }}
                </span>
                <span class="text-[9px] font-bold text-lavender-500 bg-lavender-100 px-1.5 py-0.5 rounded-md">
                    <i class="ph-fill ph-user"></i> {{ userName || '未設定' }}
                </span>
            </div>
        </div>

        <!-- 1. 行程分頁 -->
        <div v-show="activeTab === 'itinerary'" class="px-5 relative">
            <!-- 日期選擇器 -->
            <div class="date-container flex overflow-x-auto no-scrollbar space-x-4 pb-4 mt-4">
                <div v-for="date in dates" :key="date.id" @click="activeDate = date.id" 
                     class="flex flex-col items-center justify-center min-w-[62px] h-[78px] rounded-2xl transition-all cursor-pointer"
                     :class="activeDate === date.id ? 'bg-lavender-500 text-white scale-105 shadow-md' : 'bg-white text-gray-400 border border-lavender-50'">
                    <span class="text-xl font-bold">{{ date.day }}</span>
                    <span class="text-[10px] mt-1 font-bold">{{ date.date }}</span>
                </div>
            </div>

            <!-- 行程清單 (修正點：使用計算屬性並加上錯誤防止) -->
            <draggable 
                v-model="activeItineraryList" 
                item-key="id" 
                handle=".drag-handle"
                ghost-class="draggable-ghost"
                @end="saveData"
                class="space-y-4 mt-4 min-h-[50px]"
            >
                <template #item="{element, index}">
                    <div @click="openEditItinerary(element, index)" class="bg-white rounded-3xl shadow-sm border border-lavender-100 overflow-hidden relative">
                        <img v-if="element.image" :src="element.image" class="w-full h-40 object-cover">
                        <div class="p-4">
                            <div class="flex justify-between items-start">
                                <div>
                                    <span class="text-[10px] font-black text-lavender-500 bg-lavender-50 px-2 py-0.5 rounded uppercase">{{ element.category }}</span>
                                    <h3 class="text-lg font-bold text-gray-800 mt-1">{{ element.name }}</h3>
                                </div>
                                <div class="drag-handle text-gray-200 p-2 cursor-move"><i class="ph-bold ph-dots-six-vertical"></i></div>
                            </div>
                            <div class="flex items-center space-x-3 mt-2 text-xs text-gray-400 font-bold">
                                <span><i class="ph ph-clock mr-1"></i>{{ element.time }}</span>
                            </div>
                        </div>
                    </div>
                </template>
            </draggable>
            
            <button @click="openAddModal('itinerary')" class="fixed bottom-8 right-6 w-14 h-14 bg-lavender-500 text-white rounded-full shadow-lg flex items-center justify-center z-50"><i class="ph ph-plus text-2xl"></i></button>
        </div>

        <!-- 其他分頁 (簡化以維持穩定性) -->
        <div v-show="activeTab === 'expense'" class="pt-6 px-5">
            <div class="bg-gradient-to-br from-lavender-500 to-lavender-700 p-8 rounded-[32px] text-white shadow-xl mb-6 text-center">
                <p class="text-[10px] opacity-70 mb-1 font-black uppercase">總花費 (TWD)</p>
                <h2 class="text-4xl font-black">NT$ {{ totalExpenseTwd.toLocaleString() }}</h2>
            </div>
            <div class="space-y-3">
                <div v-for="(item, idx) in expenses" :key="item.id" class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-xl bg-lavender-50 flex items-center justify-center text-lavender-500"><i class="ph-fill ph-receipt"></i></div>
                        <div><p class="font-bold text-sm text-gray-800">{{ item.name }}</p></div>
                    </div>
                    <p class="font-black text-lavender-600">NT$ {{ item.amount }}</p>
                </div>
            </div>
            <button @click="openAddModal('expense')" class="fixed bottom-8 right-6 w-14 h-14 bg-lavender-500 text-white rounded-full shadow-lg flex items-center justify-center z-50"><i class="ph ph-plus text-2xl"></i></button>
        </div>
    </main>

    <!-- 模態框 -->
    <div v-if="modal.show" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-end justify-center px-4">
        <div class="bg-white w-full max-w-md rounded-t-[40px] p-8 shadow-2xl animate-slide-up max-h-[85vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-gray-800">{{ modal.title }}</h2>
                <button @click="modal.show = false" class="text-gray-400 bg-gray-50 p-2 rounded-full"><i class="ph ph-x"></i></button>
            </div>
            
            <div v-if="modal.type === 'itinerary'" class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <select v-model="form.category" class="bg-gray-50 p-4 rounded-2xl font-bold outline-none">
                        <option>景點</option><option>美食</option><option>住宿</option><option>交通</option>
                    </select>
                    <input v-model="form.time" class="bg-gray-50 p-4 rounded-2xl font-bold outline-none" placeholder="時間">
                </div>
                <input v-model="form.name" class="w-full bg-gray-50 p-4 rounded-2xl font-bold outline-none text-lg" placeholder="行程名稱">
                <textarea v-model="form.note" class="w-full bg-gray-50 p-4 rounded-2xl outline-none" rows="3" placeholder="備註..."></textarea>
                <div class="grid grid-cols-2 gap-3 mt-4">
                    <button v-if="modal.mode === 'edit'" @click="deleteItinerary(modal.idx)" class="bg-gray-100 text-gray-400 font-black p-5 rounded-3xl">刪除</button>
                    <button @click="saveItinerary" :class="modal.mode === 'edit' ? '' : 'col-span-2'" class="bg-lavender-500 text-white font-black p-5 rounded-3xl">確定</button>
                </div>
            </div>

            <div v-if="modal.type === 'expense'" class="space-y-4">
                <input v-model="form.name" class="w-full bg-gray-50 p-4 rounded-2xl font-bold outline-none text-lg" placeholder="消費項目">
                <input type="number" v-model="form.amount" class="w-full bg-gray-50 p-4 rounded-2xl font-black text-2xl outline-none" placeholder="金額">
                <button @click="saveExpense" class="w-full bg-lavender-500 text-white font-black p-5 rounded-3xl">紀錄</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC_PS1_6Ckqv6acED6Rs_A3r",
        authDomain: "mini-app-50ba0.firebaseapp.com",
        projectId: "mini-app-50ba0",
        storageBucket: "mini-app-50ba0.firebasestorage.app",
        appId: "1:542487239410:web:7abf8ad3f5a"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);
    const dbRef = doc(db, 'honeymoon_projects', 'fukuoka_2026_final_sync');

    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
        components: { draggable: window.vuedraggable },
        setup() {
            const activeTab = ref('itinerary');
            const activeDate = ref('2026-05-05');
            const dbConnected = ref(false);
            const userName = ref(localStorage.getItem('fukuoka_username') || '');
            const itinerary = ref({ '2026-05-05': [], '2026-05-06': [], '2026-05-07': [], '2026-05-08': [], '2026-05-09': [], '2026-05-10': [] });
            const expenses = ref([]);
            const dates = [
                { id: '2026-05-05', day: 'Tue', date: '5/5' }, { id: '2026-05-06', day: 'Wed', date: '5/6' },
                { id: '2026-05-07', day: 'Thu', date: '5/7' }, { id: '2026-05-08', day: 'Fri', date: '5/8' },
                { id: '2026-05-09', day: 'Sat', date: '5/9' }, { id: '2026-05-10', day: 'Sun', date: '5/10' }
            ];

            // 修正點：Computed 必須處理 undefined 情況，否則渲染會崩潰
            const activeItineraryList = computed({
                get: () => itinerary.value[activeDate.value] || [],
                set: (val) => {
                    itinerary.value[activeDate.value] = val;
                }
            });

            const modal = ref({ show: false, type: '', title: '', mode: 'add', idx: null });
            const form = ref({});

            const changeUserName = () => {
                const name = prompt('請輸入名字', userName.value);
                if (name) { userName.value = name; localStorage.setItem('fukuoka_username', name); }
            };

            const saveData = async () => {
                const data = {
                    itinerary: JSON.parse(JSON.stringify(itinerary.value)),
                    expenses: JSON.parse(JSON.stringify(expenses.value)),
                    lastUpdatedBy: userName.value
                };
                await setDoc(dbRef, data);
            };

            const openAddModal = (type) => {
                modal.value = { show: true, type, title: '新增項目', mode: 'add' };
                form.value = { category: '景點', name: '', time: '', note: '' };
            };

            const openEditItinerary = (item, idx) => {
                modal.value = { show: true, type: 'itinerary', title: '編輯', mode: 'edit', idx };
                form.value = { ...item };
            };

            const saveItinerary = () => {
                // 修正點：使用副本更新陣列參考
                const list = [...(itinerary.value[activeDate.value] || [])];
                if (modal.value.mode === 'edit') {
                    list[modal.value.idx] = { ...form.value };
                } else {
                    list.push({ ...form.value, id: Date.now() });
                }
                itinerary.value[activeDate.value] = list;
                modal.value.show = false;
                saveData();
            };

            const deleteItinerary = (idx) => {
                itinerary.value[activeDate.value].splice(idx, 1);
                modal.value.show = false;
                saveData();
            };

            const saveExpense = () => {
                expenses.value.unshift({ ...form.value, id: Date.now() });
                modal.value.show = false;
                saveData();
            };

            const totalExpenseTwd = computed(() => expenses.value.reduce((s, i) => s + (Number(i.amount) || 0), 0));

            onMounted(() => {
                onSnapshot(dbRef, (snap) => {
                    dbConnected.value = true;
                    if (snap.exists()) {
                        const d = snap.data();
                        if (d.itinerary) itinerary.value = d.itinerary;
                        if (d.expenses) expenses.value = d.expenses;
                    }
                });
            });

            return {
                activeTab, activeDate, dates, itinerary, activeItineraryList, expenses, totalExpenseTwd,
                dbConnected, userName, changeUserName, modal, form, 
                openAddModal, openEditItinerary, saveItinerary, deleteItinerary, saveExpense, saveData
            }
        }
    }).mount('#app');
</script>
</body>
</html>
