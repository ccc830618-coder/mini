<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>福岡蜜月旅行 - 穩定同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Vue.Draggable/4.1.0/vuedraggable.umd.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lavender: {
                            50: '#FDFBFD', 100: '#F4EBFC', 200: '#E6D4F4',
                            300: '#D4B3EA', 400: '#BD8ADD', 500: '#A160CE', 600: '#8A45B8'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { background-color: #FDFBFD; font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        [v-cloak] { display: none; }
        .draggable-ghost { opacity: 0.5; background: #E6D4F4 !important; border: 2px dashed #A160CE !important; }
        @keyframes slide-up { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slide-up 0.3s ease-out; }
    </style>
</head>
<body class="text-gray-700 antialiased">

<div id="app" v-cloak class="max-w-md mx-auto bg-lavender-50 min-h-screen relative shadow-2xl overflow-hidden">
    
    <!-- 錯誤提示區 (Debug 用) -->
    <div v-if="errorMessage" class="fixed top-4 left-1/2 -translate-x-1/2 z-[200] w-[90%] bg-red-500 text-white p-3 rounded-xl shadow-lg text-xs font-bold flex justify-between items-center">
        <span><i class="ph-bold ph-warning-circle mr-1"></i> {{ errorMessage }}</span>
        <button @click="errorMessage = ''"><i class="ph ph-x"></i></button>
    </div>

    <!-- 頁首區域 -->
    <header class="relative h-[200px] w-full bg-lavender-200">
        <img src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=800&q=80" alt="Fukuoka" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
        <div class="relative text-center z-10 pt-8">
            <h1 class="text-white text-3xl font-black tracking-widest drop-shadow-lg">FUKUOKA</h1>
            <p class="text-lavender-100 text-xs font-bold mt-1 tracking-[0.3em]">HONEYMOON 2026</p>
        </div>
        
        <!-- Tab 切換 -->
        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex space-x-1 bg-white/20 backdrop-blur-md p-1 rounded-2xl border border-white/30 z-20">
            <button v-for="tab in ['itinerary', 'info', 'expense']" :key="tab" @click="activeTab = tab" 
                    :class="activeTab === tab ? 'bg-white text-lavender-600 shadow-sm' : 'text-white'" 
                    class="px-5 py-2 rounded-xl text-xs font-black transition-all">
                {{ tab === 'itinerary' ? '行程' : (tab === 'info' ? '助手' : '花費') }}
            </button>
        </div>
    </header>

    <main class="bg-lavender-50 rounded-t-[32px] -mt-6 relative z-10 min-h-[calc(100vh-176px)] pb-24 shadow-[0_-10px_30px_rgba(0,0,0,0.08)]">
        
        <!-- 狀態欄 -->
        <div class="flex items-center justify-center py-4 space-x-2">
            <div :class="dbConnected ? 'bg-green-500 animate-pulse' : 'bg-red-400'" class="w-2 h-2 rounded-full"></div>
            <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">
                {{ dbConnected ? 'Firebase Connected' : 'Connecting...' }}
            </span>
        </div>

        <!-- 1. 行程分頁 -->
        <div v-show="activeTab === 'itinerary'" class="px-5">
            <!-- 日期選擇 -->
            <div class="date-container flex overflow-x-auto no-scrollbar space-x-3 pb-6">
                <div v-for="date in dates" :key="date.id" @click="activeDate = date.id" 
                     class="flex flex-col items-center justify-center min-w-[64px] h-[84px] rounded-[24px] transition-all cursor-pointer shadow-sm"
                     :class="activeDate === date.id ? 'bg-lavender-500 text-white scale-105 shadow-lg' : 'bg-white text-gray-400 border border-lavender-50'">
                    <span class="text-xl font-black">{{ date.day }}</span>
                    <span class="text-[10px] mt-1 font-bold uppercase">{{ date.date }}</span>
                </div>
            </div>

            <!-- 行程內容 -->
            <draggable 
                v-model="activeItineraryList" 
                item-key="id" 
                handle=".drag-handle"
                ghost-class="draggable-ghost"
                @end="saveData"
                class="space-y-4 min-h-[150px]"
            >
                <template #item="{element, index}">
                    <div @click="openEditItinerary(element, index)" class="bg-white rounded-[24px] shadow-sm border border-lavender-100 p-5 active:scale-[0.98] transition-all">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <div class="flex items-center space-x-2">
                                    <span class="text-[10px] font-black text-lavender-500 bg-lavender-50 px-2 py-0.5 rounded-full">{{ element.category }}</span>
                                    <span class="text-xs font-bold text-gray-400"><i class="ph ph-clock mr-1"></i>{{ element.time }}</span>
                                </div>
                                <h3 class="text-lg font-black text-gray-800 mt-2">{{ element.name }}</h3>
                                <p v-if="element.note" class="text-xs text-gray-400 mt-1 italic">{{ element.note }}</p>
                            </div>
                            <div class="drag-handle text-gray-200 p-2 cursor-move"><i class="ph-bold ph-dots-six-vertical text-xl"></i></div>
                        </div>
                    </div>
                </template>
            </draggable>
        </div>

        <!-- 2. 匯率助手 -->
        <div v-show="activeTab === 'info'" class="px-5 pt-4 space-y-6">
            <div class="bg-white rounded-[28px] p-6 shadow-sm border border-lavender-100">
                <h3 class="font-black text-gray-800 mb-4 flex items-center"><i class="ph-fill ph-currency-jpy mr-2 text-lavender-500"></i>匯率助手 (0.213)</h3>
                <div class="space-y-4">
                    <div class="relative">
                        <span class="absolute top-2 left-4 text-[10px] text-lavender-400 font-black">JPY</span>
                        <input type="number" v-model="jpy" @input="jpyToTwd" class="w-full bg-gray-50 p-4 pt-7 rounded-2xl font-black text-xl outline-none">
                    </div>
                    <div class="relative">
                        <span class="absolute top-2 left-4 text-[10px] text-lavender-400 font-black">TWD</span>
                        <input type="number" v-model="twd" @input="twdToJpy" class="w-full bg-gray-50 p-4 pt-7 rounded-2xl font-black text-xl outline-none">
                    </div>
                </div>
            </div>
        </div>

        <!-- 3. 花費紀錄 -->
        <div v-show="activeTab === 'expense'" class="px-5 pt-6">
            <div class="bg-gradient-to-br from-lavender-500 to-lavender-700 p-8 rounded-[36px] text-white shadow-xl mb-6 text-center">
                <p class="text-[10px] opacity-70 mb-1 font-black uppercase tracking-widest">Total Spend</p>
                <h2 class="text-4xl font-black">NT$ {{ totalExpenseTwd.toLocaleString() }}</h2>
            </div>
            <div class="space-y-3">
                <div v-for="(item, idx) in expenses" :key="item.id" class="bg-white p-5 rounded-[24px] shadow-sm flex justify-between items-center border border-lavender-50">
                    <div>
                        <p class="font-black text-sm text-gray-800">{{ item.name }}</p>
                        <p class="text-[10px] text-gray-400 font-bold">NT$ {{ item.amount }}</p>
                    </div>
                    <button @click="expenses.splice(idx, 1); saveData()" class="text-gray-300 hover:text-red-400"><i class="ph ph-trash"></i></button>
                </div>
            </div>
        </div>
    </main>

    <!-- 懸浮按鈕 -->
    <button @click="openAddModal" class="fixed bottom-8 right-6 w-16 h-16 bg-lavender-500 text-white rounded-full shadow-2xl flex items-center justify-center z-50 border-4 border-white active:scale-90 transition-all">
        <i class="ph-bold ph-plus text-2xl"></i>
    </button>

    <!-- 彈窗 -->
    <div v-if="modal.show" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-end justify-center px-4">
        <div class="bg-white w-full max-w-md rounded-t-[40px] p-8 shadow-2xl animate-slide-up max-h-[85vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-gray-800">{{ modal.title }}</h2>
                <button @click="modal.show = false" class="text-gray-400 bg-gray-50 p-2 rounded-full"><i class="ph ph-x text-xl"></i></button>
            </div>
            
            <div class="space-y-4">
                <template v-if="activeTab === 'itinerary'">
                    <div class="grid grid-cols-2 gap-3">
                        <select v-model="form.category" class="bg-gray-50 p-4 rounded-2xl font-black outline-none">
                            <option>景點</option><option>美食</option><option>住宿</option><option>交通</option>
                        </select>
                        <input v-model="form.time" class="bg-gray-50 p-4 rounded-2xl font-black outline-none" placeholder="10:00">
                    </div>
                    <input v-model="form.name" class="w-full bg-gray-50 p-4 rounded-2xl font-black text-lg outline-none" placeholder="項目名稱">
                    <textarea v-model="form.note" class="w-full bg-gray-50 p-4 rounded-2xl font-bold outline-none" rows="3" placeholder="備註..."></textarea>
                    <div class="grid grid-cols-2 gap-3 pt-2">
                        <button v-if="modal.mode === 'edit'" @click="deleteItinerary(modal.idx)" class="bg-gray-100 text-gray-400 font-black py-4 rounded-2xl">刪除</button>
                        <button @click="saveItinerary" :class="modal.mode === 'edit' ? '' : 'col-span-2'" class="bg-lavender-500 text-white font-black py-4 rounded-2xl shadow-lg">確認儲存</button>
                    </div>
                </template>

                <template v-else>
                    <input v-model="form.name" class="w-full bg-gray-50 p-4 rounded-2xl font-black text-lg outline-none" placeholder="消費項目">
                    <input type="number" v-model="form.amount" class="w-full bg-gray-50 p-4 rounded-2xl font-black text-2xl outline-none" placeholder="金額 (NT$)">
                    <button @click="saveExpense" class="w-full bg-lavender-500 text-white font-black py-4 rounded-2xl shadow-lg mt-2">紀錄花費</button>
                </template>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

    // 請確保這裡的配置與你的 Firebase Console 內容完全一致
    const firebaseConfig = {
        apiKey: "AIzaSyC_PS1_6Ckqv6acED6Rs_A3r", 
        authDomain: "mini-app-50ba0.firebaseapp.com",
        projectId: "mini-app-50ba0",
        storageBucket: "mini-app-50ba0.firebasestorage.app",
        appId: "1:542487239410:web:7abf8ad3f5a"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);
    // 使用新的集合路徑，避免舊資料衝突
    const dbRef = doc(db, 'honeymoon_v3', 'fukuoka_final');

    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
        components: { draggable: window.vuedraggable },
        setup() {
            const activeTab = ref('itinerary');
            const activeDate = ref('2026-05-05');
            const dbConnected = ref(false);
            const errorMessage = ref('');
            const jpy = ref(0);
            const twd = ref(0);
            const rate = 0.213;

            const dates = [
                { id: '2026-05-05', day: 'TUE', date: '5/5' }, { id: '2026-05-06', day: 'WED', date: '5/6' },
                { id: '2026-05-07', day: 'THU', date: '5/7' }, { id: '2026-05-08', day: 'FRI', date: '5/8' },
                { id: '2026-05-09', day: 'SAT', date: '5/9' }, { id: '2026-05-10', day: 'SUN', date: '5/10' }
            ];

            const itinerary = ref({ '2026-05-05': [], '2026-05-06': [], '2026-05-07': [], '2026-05-08': [], '2026-05-09': [], '2026-05-10': [] });
            const expenses = ref([]);

            const activeItineraryList = computed({
                get: () => itinerary.value[activeDate.value] || [],
                set: (val) => { itinerary.value[activeDate.value] = val; }
            });

            const modal = ref({ show: false, title: '', mode: 'add', idx: null });
            const form = ref({});

            const jpyToTwd = () => twd.value = Math.round(jpy.value * rate);
            const twdToJpy = () => jpy.value = Math.round(twd.value / rate);

            const saveData = async () => {
                try {
                    const data = {
                        itinerary: JSON.parse(JSON.stringify(itinerary.value)),
                        expenses: JSON.parse(JSON.stringify(expenses.value)),
                        updatedAt: Date.now()
                    };
                    await setDoc(dbRef, data);
                    console.log("Saved successfully");
                } catch (e) {
                    console.error("Save Error:", e);
                    errorMessage.value = "儲存失敗: " + e.message;
                }
            };

            const openAddModal = () => {
                modal.value = { show: true, title: '新增項目', mode: 'add' };
                form.value = { category: '景點', name: '', time: '', note: '', amount: '' };
            };

            const openEditItinerary = (item, idx) => {
                modal.value = { show: true, title: '編輯項目', mode: 'edit', idx };
                form.value = { ...item };
            };

            const saveItinerary = () => {
                const list = [...(itinerary.value[activeDate.value] || [])];
                if (modal.value.mode === 'edit') {
                    list[modal.value.idx] = { ...form.value };
                } else {
                    list.push({ ...form.value, id: Date.now() });
                }
                itinerary.value[activeDate.value] = list;
                modal.value.show = false;
                saveData();
            };

            const deleteItinerary = (idx) => {
                itinerary.value[activeDate.value].splice(idx, 1);
                modal.value.show = false;
                saveData();
            };

            const saveExpense = () => {
                expenses.value.unshift({ ...form.value, id: Date.now() });
                modal.value.show = false;
                saveData();
            };

            const totalExpenseTwd = computed(() => expenses.value.reduce((s, i) => s + (Number(i.amount) || 0), 0));

            onMounted(() => {
                try {
                    onSnapshot(dbRef, (snap) => {
                        dbConnected.value = true;
                        if (snap.exists()) {
                            const d = snap.data();
                            if (d.itinerary) itinerary.value = d.itinerary;
                            if (d.expenses) expenses.value = d.expenses;
                        }
                    }, (err) => {
                        console.error("Snapshot Error:", err);
                        errorMessage.value = "讀取權限問題: " + err.code;
                    });
                } catch (e) {
                    errorMessage.value = "Firebase 初始化失敗";
                }
            });

            return {
                activeTab, activeDate, dates, itinerary, activeItineraryList, expenses, totalExpenseTwd,
                jpy, twd, jpyToTwd, twdToJpy, dbConnected, errorMessage,
                modal, form, openAddModal, openEditItinerary, saveItinerary, deleteItinerary, saveExpense, saveData
            }
        }
    }).mount('#app');
</script>
</body>
</html>
