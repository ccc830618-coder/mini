<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>福岡蜜月旅行 | 兩人同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Firebase SDK (使用固定版本並確保 HTTPS 相容) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, setDoc, onSnapshot };
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lavender: {
                            50: '#FDFBFD', 100: '#F4EBFC', 200: '#E6D4F4',
                            300: '#D4B3EA', 400: '#BD8ADD', 500: '#A160CE', 600: '#8A45B8'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { background-color: #FDFBFD; font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes slide-up { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slide-up 0.3s ease-out; }
    </style>
</head>
<body class="text-gray-700 antialiased">

<div id="app" class="max-w-md mx-auto bg-lavender-50 min-h-screen relative shadow-xl overflow-hidden">
    
    <!-- 頁首 Banner -->
    <header class="relative h-[220px] w-full bg-lavender-200">
        <img src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=800&q=80" alt="Fukuoka" class="w-full h-full object-cover object-left">
        <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
        
        <!-- 同步狀態 -->
        <div class="absolute top-4 right-4 z-50">
            <div class="flex items-center space-x-1.5 px-2 py-1 bg-black/30 backdrop-blur rounded-full border border-white/20">
                <div :class="cloudSynced ? 'bg-green-400' : 'bg-orange-400'" class="w-1.5 h-1.5 rounded-full shadow-sm animate-pulse"></div>
                <span class="text-[8px] text-white font-black uppercase tracking-tighter">{{ cloudSynced ? '已雲端同步' : '正在連線' }}</span>
            </div>
        </div>

        <div class="relative text-center z-10 pt-10">
            <h1 class="text-white text-3xl font-black tracking-widest drop-shadow-md">FUKUOKA</h1>
            <p class="text-lavender-100 text-xs font-bold mt-1 tracking-[0.3em]">HONEYMOON 2026</p>
        </div>
        
        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex space-x-1 bg-white/20 backdrop-blur-md p-1 rounded-2xl border border-white/30 z-20">
            <button @click="activeTab = 'itinerary'" :class="activeTab === 'itinerary' ? 'bg-white text-lavender-600 shadow-sm' : 'text-white'" class="px-4 py-1.5 rounded-xl text-xs font-black transition-all">行程</button>
            <button @click="activeTab = 'info'" :class="activeTab === 'info' ? 'bg-white text-lavender-600 shadow-sm' : 'text-white'" class="px-4 py-1.5 rounded-xl text-xs font-black transition-all">清單</button>
            <button @click="activeTab = 'shopping'" :class="activeTab === 'shopping' ? 'bg-white text-lavender-600 shadow-sm' : 'text-white'" class="px-4 py-1.5 rounded-xl text-xs font-black transition-all">購物</button>
            <button @click="activeTab = 'expense'" :class="activeTab === 'expense' ? 'bg-white text-lavender-600 shadow-sm' : 'text-white'" class="px-4 py-1.5 rounded-xl text-xs font-black transition-all">花費</button>
        </div>
    </header>

    <main class="bg-lavender-50 rounded-t-[32px] -mt-6 relative z-10 min-h-[calc(100vh-156px)] pb-24 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
        
        <!-- 內容區域 (這部分邏輯與原本一致，簡化呈現) -->
        <div v-show="activeTab === 'itinerary'" class="pt-6 px-5">
            <!-- 日期與行程卡片... -->
            <div class="flex overflow-x-auto no-scrollbar space-x-4 pb-4">
                <div v-for="date in dates" :key="date.id" @click="activeDate = date.id" 
                     class="flex flex-col items-center justify-center min-w-[62px] h-[78px] rounded-2xl transition-all shadow-sm"
                     :class="activeDate === date.id ? 'bg-lavender-500 text-white' : 'bg-white text-gray-400 border border-lavender-50'">
                    <span class="text-xl font-bold">{{ date.day }}</span>
                    <span class="text-[10px] mt-1 font-bold">{{ date.date }}</span>
                </div>
            </div>
            
            <!-- 行程列表 -->
            <div class="space-y-4 mt-4">
                <div v-for="(item, idx) in itinerary[activeDate]" :key="item.id" @click="openEditItinerary(item, idx)" class="bg-white rounded-3xl shadow-sm border border-lavender-100 overflow-hidden relative active:scale-95 transition-all">
                    <img v-if="item.image" :src="item.image" class="w-full h-40 object-cover">
                    <div class="p-4">
                        <span class="text-[10px] font-black text-lavender-500 bg-lavender-50 px-2 py-0.5 rounded uppercase tracking-wider">{{ item.category }}</span>
                        <h3 class="text-lg font-bold text-gray-800 mt-1">{{ item.name }}</h3>
                        <div class="flex items-center space-x-3 mt-2 text-xs text-gray-400 font-bold">
                            <span class="flex items-center"><i class="ph ph-clock mr-1"></i>{{ item.time }}</span>
                        </div>
                    </div>
                </div>
                <div v-if="itinerary[activeDate]?.length === 0" class="text-center py-20 opacity-30">
                    <i class="ph ph-calendar-blank text-5xl mb-2"></i>
                    <p class="text-sm font-bold">今天還沒有行程唷</p>
                </div>
            </div>
            <button @click="openAddModal('itinerary')" class="fixed bottom-8 right-6 w-14 h-14 bg-lavender-500 text-white rounded-full shadow-lg flex items-center justify-center z-50"><i class="ph ph-plus text-2xl font-bold"></i></button>
        </div>

        <!-- 購物/花費等分頁 (邏輯同前，為節省空間縮減) -->
        <div v-show="activeTab === 'expense'" class="pt-6 px-5">
            <div class="bg-gradient-to-br from-lavender-500 to-lavender-700 p-8 rounded-[32px] text-white shadow-xl mb-6 text-center">
                <p class="text-[10px] opacity-70 mb-1 font-black uppercase">總預算加總 (TWD)</p>
                <h2 class="text-4xl font-black">NT$ {{ totalExpenseTwd.toLocaleString() }}</h2>
            </div>
            <div class="space-y-3">
                <div v-for="(item, idx) in expenses" :key="item.id" class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-lavender-50">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-xl bg-lavender-50 flex items-center justify-center text-lavender-500"><i class="ph-fill ph-receipt text-xl"></i></div>
                        <div><p class="font-bold text-sm text-gray-800">{{ item.name }}</p></div>
                    </div>
                    <p class="font-black text-lavender-600">NT$ {{ item.amount }}</p>
                </div>
            </div>
            <button @click="openAddModal('expense')" class="fixed bottom-8 right-6 w-14 h-14 bg-lavender-500 text-white rounded-full shadow-lg flex items-center justify-center z-50"><i class="ph ph-plus text-2xl font-bold"></i></button>
        </div>
        
        <!-- 其他分頁略，保留原本結構即可 -->
    </main>

    <!-- 模態框... -->
    <div v-if="modal.show" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-end justify-center px-4">
        <div class="bg-white w-full max-w-md rounded-t-[40px] p-8 shadow-2xl animate-slide-up max-h-[85vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-gray-800">{{ modal.title }}</h2>
                <button @click="modal.show = false" class="text-gray-400 bg-gray-50 p-2 rounded-full"><i class="ph ph-x text-xl font-bold"></i></button>
            </div>
            
            <!-- 新增行程 -->
            <div v-if="modal.type === 'itinerary'" class="space-y-4">
                <input v-model="form.name" class="w-full bg-gray-50 p-4 rounded-2xl font-bold outline-none" placeholder="想去哪裡？">
                <input v-model="form.time" class="w-full bg-gray-50 p-4 rounded-2xl font-bold outline-none" placeholder="時間（如 14:00）">
                <button @click="saveItinerary" class="w-full bg-lavender-500 text-white font-black p-5 rounded-3xl">儲存並同步</button>
            </div>

            <!-- 紀錄花費 -->
            <div v-if="modal.type === 'expense'" class="space-y-4">
                <input v-model="form.name" class="w-full bg-gray-50 p-4 rounded-2xl font-bold outline-none" placeholder="支出項目">
                <input type="number" v-model="form.amount" class="w-full bg-gray-50 p-4 rounded-2xl font-black text-2xl outline-none" placeholder="NT$ 金額">
                <button @click="saveExpense" class="w-full bg-lavender-500 text-white font-black p-5 rounded-3xl">同步金額</button>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
        setup() {
            const activeTab = ref('itinerary');
            const activeDate = ref('2026-05-05');
            const cloudSynced = ref(false);
            const rate = ref(0.21);
            
            const dates = [
                { id: '2026-05-05', day: 'Tue', date: '5/5' }, { id: '2026-05-06', day: 'Wed', date: '5/6' },
                { id: '2026-05-07', day: 'Thu', date: '5/7' }, { id: '2026-05-08', day: 'Fri', date: '5/8' },
                { id: '2026-05-09', day: 'Sat', date: '5/9' }, { id: '2026-05-10', day: 'Sun', date: '5/10' }
            ];

            const flights = ref({ departure: {}, return: {} });
            const itinerary = ref({ '2026-05-05': [], '2026-05-06': [], '2026-05-07': [], '2026-05-08': [], '2026-05-09': [], '2026-05-10': [] });
            const expenses = ref([]);
            
            const modal = ref({ show: false, type: '', title: '' });
            const form = ref({});

            // Firebase 配置 (修正重點)
            const firebaseConfig = JSON.parse(__firebase_config);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'honeymoon-fukuoka-love';
            let db;

            const initCloud = async () => {
                const { initializeApp, getAuth, signInAnonymously, getFirestore, doc, onSnapshot, setDoc, signInWithCustomToken } = window.FB;
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                db = getFirestore(app);

                // 登入
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                // 實時監聽 (兩人同步的關鍵)
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'trip_v1');
                onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        const d = snap.data();
                        itinerary.value = d.itinerary || itinerary.value;
                        expenses.value = d.expenses || [];
                        cloudSynced.value = true;
                    }
                }, (err) => console.log("等待連線中..."));
            };

            const pushToCloud = async () => {
                if (!db) return;
                cloudSynced.value = false;
                try {
                    const docRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'trip_v1');
                    await window.FB.setDoc(docRef, {
                        itinerary: itinerary.value,
                        expenses: expenses.value,
                        updatedAt: Date.now()
                    }, { merge: true });
                    cloudSynced.value = true;
                } catch (e) { console.error(e); }
            };

            const openAddModal = (type) => {
                modal.value = { show: true, type, title: type === 'itinerary' ? '新增行程' : '紀錄支出' };
                form.value = { category: '景點', time: '', name: '', amount: '' };
            };

            const saveItinerary = () => {
                itinerary.value[activeDate.value].push({ ...form.value, id: Date.now() });
                pushToCloud();
                modal.value.show = false;
            };

            const saveExpense = () => {
                expenses.value.unshift({ ...form.value, id: Date.now() });
                pushToCloud();
                modal.value.show = false;
            };

            const totalExpenseTwd = computed(() => expenses.value.reduce((s, i) => s + (Number(i.amount) || 0), 0));

            onMounted(() => { initCloud(); });

            return {
                activeTab, activeDate, dates, itinerary, expenses, totalExpenseTwd,
                cloudSynced, modal, form, openAddModal, saveItinerary, saveExpense
            }
        }
    }).mount('#app');
</script>

</body>
</html>
